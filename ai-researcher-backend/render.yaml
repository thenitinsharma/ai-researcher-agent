services:
  - type: web
    name: ai-researcher-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: GOOGLE_API_KEY
        sync: false        # set manually in dashboard — don't commit secrets
      - key: FRONTEND_URL
        sync: false        # your Vercel URL, set after frontend is deployed
